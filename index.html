<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA LEAGUE - Acompanhamento Real-Time</title>
    <style>
        :root { --bg: #050505; --card: #111; --neon: #00ff87; --text: #fff; --dim: #777; --gold: #ffd700; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* Layout Mobile-First */
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--neon); padding-bottom: 10px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: #222; color: var(--dim); border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
        .tab-btn.active { background: var(--neon); color: #000; }

        .table-container { background: var(--card); border-radius: 12px; padding: 10px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--dim); padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        
        .pos { font-weight: bold; width: 30px; text-align: center; }
        .pts-oficiais { color: var(--neon); font-weight: 800; }
        .desempenho-tag { color: var(--neon); font-size: 0.75rem; font-weight: bold; border: 1px solid var(--neon); padding: 2px 5px; border-radius: 4px; }
        
        /* Menu Admin escondido para os outros */
        .admin-section { display: none; margin-top: 20px; background: #1a1a1a; padding: 15px; border-radius: 10px; }
        .btn-config { background: none; border: 1px solid #333; color: #333; font-size: 0.6rem; cursor: pointer; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0; font-size: 1.5rem;">FIFA <span style="color:var(--neon)">PRO LEAGUE</span></h1>
        <p style="font-size: 0.7rem; color: var(--dim); margin: 0;">Acompanhe o ranking em tempo real</p>
    </header>

    <div class="nav-tabs">
        <button id="tab-1" class="tab-btn active" onclick="switchTab('atual')">Temporada Atual</button>
        <button id="tab-2" class="tab-btn" onclick="switchTab('geral')">Ranking Geral (All-Time)</button>
    </div>

    <div class="table-container">
        <table id="tabela-fifa">
            <thead>
                <tr>
                    <th>#</th>
                    <th>JOGADOR</th>
                    <th>PTS</th>
                    <th>V/E/D</th>
                    <th>GP/GC</th>
                    <th>SG</th>
                    <th>BÔNUS</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <button class="btn-config" onclick="abrirAdmin()">Config</button>
    
    <div id="adminPanel" class="admin-section">
        <h3>Admin: Editar Resultados</h3>
        <div id="formLista"></div>
        <button onclick="addNovo()" style="width:100%; margin: 10px 0;">+ Jogador</button>
        <button onclick="salvar()" style="width:100%; background:var(--neon); color:#000; font-weight:bold; padding:10px;">SALVAR TUDO</button>
        <button onclick="encerrarTemporada()" style="width:100%; margin-top:20px; background:red; color:white;">Encerrar Temporada (Soma no Geral)</button>
    </div>
</div>

<script>
    // Carrega dados do LocalStorage
    let db = JSON.parse(localStorage.getItem('fifa_app_data')) || { atual: [], historico: [] };
    let vista = 'atual';

    function switchTab(t) {
        vista = t;
        document.getElementById('tab-1').classList.toggle('active', t === 'atual');
        document.getElementById('tab-2').classList.toggle('active', t === 'geral');
        render();
    }

    function render() {
        const tbody = document.querySelector("#tabela-fifa tbody");
        let dados = (vista === 'atual') ? processar(db.atual) : processarGeral();

        tbody.innerHTML = dados.map((j, i) => `
            <tr>
                <td class="pos" style="color:${i==0?'gold':''}">${i+1}º</td>
                <td style="font-weight:bold">${j.nome}</td>
                <td class="pts-oficiais">${j.pts}</td>
                <td>${j.v}/${j.e}/${j.d}</td>
                <td style="color:#aaa">${j.gf}/${j.gs}</td>
                <td>${j.gf - j.gs}</td>
                <td><span class="desempenho-tag">${j.bonus}</span></td>
            </tr>
        `).join('');
    }

    function processar(lista) {
        let r = lista.map(j => {
            let pts = (j.v*3)+(j.e*1);
            let bPos = 0; // Calculado após ordenação
            return {...j, pts};
        }).sort((a,b) => b.pts - a.pts || (a.gf-a.gs) - (b.gf-b.gs));

        return r.map((j, i) => {
            let bPos = (i==0?20:(i==1?15:(i==2?10:0)));
            let bonus = (bPos + (j.gf*2.5) + (j.gs*-2)).toFixed(1);
            return {...j, bonus};
        });
    }

    function processarGeral() {
        let soma = {};
        [...db.historico, db.atual].forEach(t => {
            t.forEach(j => {
                if(!soma[j.nome]) soma[j.nome] = {nome:j.nome, v:0, e:0, d:0, gf:0, gs:0};
                soma[j.nome].v += j.v; soma[j.nome].e += j.e; soma[j.nome].d += j.d;
                soma[j.nome].gf += j.gf; soma[j.nome].gs += j.gs;
            });
        });
        return processar(Object.values(soma));
    }

    // Funções de Admin (Simplificadas)
    function abrirAdmin() { document.getElementById('adminPanel').style.display = 'block'; renderAdmin(); }
    function renderAdmin() {
        document.getElementById('formLista').innerHTML = db.atual.map((j,i) => `
            <div style="border-bottom:1px solid #333; padding:5px;">
                ${j.nome} | V:<input type="number" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)"> 
                GF:<input type="number" value="${j.gf}" onchange="db.atual[${i}].gf=parseInt(this.value)">
                GS:<input type="number" value="${j.gs}" onchange="db.atual[${i}].gs=parseInt(this.value)">
            </div>
        `).join('');
    }
    function addNovo() { let n = prompt("Nome do Jogador:"); if(n) db.atual.push({nome:n, v:0, e:0, d:0, gf:0, gs:0}); renderAdmin(); }
    function salvar() { localStorage.setItem('fifa_app_data', JSON.stringify(db)); render(); alert("Salvo!"); }
    function encerrarTemporada() { if(confirm("Zerar e salvar no geral?")) { db.historico.push([...db.atual]); db.atual = db.atual.map(j=>({...j,v:0,e:0,d:0,gf:0,gs:0})); salvar(); } }

    render();
</script>
</body>
</html>
